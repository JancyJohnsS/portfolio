<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,Arial;
background:#f8fafc;
color:#1e293b;
line-height:1.7;
overflow-x:hidden;
}

/* GLOBAL */

.container{
max-width:1200px;
margin:auto;
width:100%;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:flex-end;
background:rgba(255,255,255,.85);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#334155;
font-weight:500;
position:relative;
}

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#6366f1;
transition:.3s;
}

nav a:hover::after{
width:100%;
}

/* HERO */

.hero{
padding:170px 8% 120px;
background:
radial-gradient(circle at 10% 20%, #e0e7ff 0%, transparent 40%),
radial-gradient(circle at 80% 50%, #cffafe 0%, transparent 40%),
linear-gradient(135deg,#eef2ff,#f8fafc);
}

.hero-grid{
display:grid;
grid-template-columns:280px 1fr;
gap:70px;
align-items:center;
max-width:1100px;
margin:auto;
}

/* PROFILE */

.profile-img{
width:240px;
height:240px;
border-radius:50%;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.15);
transition:.5s;
}

.profile-img:hover{
transform:scale(1.05);
}

.profile-img img{
width:100%;
height:120%;
object-fit:cover;
}

/* NAME */

.profile-name{
font-size:34px;
margin-top:20px;
font-weight:600;

background:linear-gradient(90deg,#6366f1,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TEXT */

.profile-text{
font-size:18px;
max-width:820px;
word-wrap:break-word;
text-align:justify;
line-height:1.8;
}

/* SECTIONS */

.section{
padding:110px 8%;
}

.section h2{
font-size:32px;
margin-bottom:40px;

background:linear-gradient(90deg,#0ea5e9,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SKILLS */

.section-grey{
background:linear-gradient(180deg,#ffffff,#f1f5f9);
}

.skills{
display:flex;
flex-wrap:wrap;
gap:14px;
}

.skill{
padding:11px 20px;
border-radius:30px;
font-size:14px;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.skill:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,.15);
}

/* EXPERIENCE */

.section-light{
background:#ffffff;
}

.timeline-item{
margin-bottom:30px;
padding-left:22px;
position:relative;
transition:.3s;
}

.timeline-item:hover{
transform:translateX(5px);
}

.timeline-item:before{
content:"";
position:absolute;
left:0;
top:7px;
width:8px;
height:8px;
border-radius:50%;
background:linear-gradient(45deg,#6366f1,#06b6d4);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:26px;
}

/* AWARDS - ONLY 2 ITEMS PER ROW */

#awards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:26px;
}

@media(max-width:700px){
#awards{
grid-template-columns:1fr;
}
}

/* EDUCATION */

.edu-card{
padding:24px;
border-radius:14px;
background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
box-shadow:0 10px 25px rgba(0,0,0,.08);
word-break:break-word;
transition:.3s;
}

.edu-card:hover{
transform:translateY(-8px);
}

/* PROJECT */

.project{
padding:24px;
border-radius:14px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.08);
word-break:break-word;
transition:.3s;
}

.project:hover{
transform:translateY(-8px);
}

/* PUBLICATIONS */

.pub-card{
margin-bottom:18px;
padding:18px;
background:#f8fafc;
border-radius:10px;
word-break:break-word;
transition:.3s;
}

.pub-card:hover{
transform:translateY(-5px);
}

.pub-card b{
background:linear-gradient(90deg,#06b6d4,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* CERTIFICATIONS */

.carousel{
overflow:hidden;
}

.track{
display:flex;
gap:25px;
animation:scroll 35s linear infinite;
}

.carousel:hover .track{
animation-play-state:paused;
}

.slide{
min-width:260px;
padding:24px;
background:white;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
transition:.3s;
}

.slide:hover{
transform:translateY(-8px);
}

.verify-btn{
margin-top:14px;
padding:7px 16px;
border-radius:18px;
font-size:13px;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#6366f1,#06b6d4);
width:fit-content;
transition:.3s;
}

.verify-btn:hover{
transform:scale(1.05);
opacity:.9;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* AWARDS */

.award{
padding:24px;
border-radius:14px;
background:linear-gradient(135deg,#e0f2fe,#eef2ff);
box-shadow:0 10px 30px rgba(0,0,0,.08);
word-break:break-word;
transition:.3s;
}

.award:hover{
transform:translateY(-8px);
}

/* REFERENCES */

.reference{
padding:22px;
border-radius:14px;
background:#f1f5f9;
box-shadow:0 8px 20px rgba(0,0,0,.07);
word-break:break-word;
transition:.3s;
}

.reference:hover{
transform:translateY(-6px);
}

/* CONTACT */

.section-dark{
background:linear-gradient(135deg,#020617,#0f172a);
color:#cbd5f5;
}

.section-dark a{
color:#93c5fd;
word-break:break-all;
}

/* FOOTER */

footer{
background:#020617;
color:#64748b;
text-align:center;
padding:30px;
position:relative;
}

/* @th TAG */

.th{
position:absolute;
right:20px;
bottom:8px;
font-size:12px;
font-family:Orbitron,monospace;
letter-spacing:2px;
color:#38bdf8;
animation:runText 6s linear infinite;
}

@keyframes runText{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

/* MOBILE */

@media(max-width:900px){

.hero-grid{
grid-template-columns:1fr;
gap:40px;
text-align:center;
}

.profile-img{
margin:auto;
}

.profile-text{
margin:auto;
}

.section{
padding:90px 7%;
}

nav{
padding:16px 7%;
}

}

</style>

</head>

<body>

<nav>

<a href="#skills">Skills</a>
<a href="#experience">Experience</a>
<a href="#education">Education</a>
<a href="#contact">Contact</a>

</nav>

<section class="hero">

<div class="hero-grid">

<div>

<div class="profile-img">
<img src="Jancy.jpg">
</div>

<div class="profile-name" id="name"></div>

</div>

<div class="profile-text">
<p id="profile"></p>
</div>

</div>

</section>

<section class="section section-grey" id="skills">
<div class="container">
<h2>Professional Skills</h2>
<div class="skills" id="skillsData"></div>
</div>
</section>

<section class="section section-light" id="experience">
<div class="container">
<h2>Professional Experience</h2>
<div id="experienceData"></div>
</div>
</section>

<section class="section section-grey" id="education">
<div class="container">
<h2>Education</h2>
<div class="grid" id="educationData"></div>
</div>
</section>

<section class="section section-light">
<div class="container">
<h2>Projects & Research</h2>
<div class="grid" id="projects"></div>
</div>
</section>

<section class="section section-grey">
<div class="container">
<h2>Publications</h2>
<div id="publicationsData"></div>
</div>
</section>

<section class="section section-light">
<div class="container">
<h2>Certifications</h2>
<div class="carousel">
<div class="track" id="certifications"></div>
</div>
</div>
</section>

<section class="section section-grey">
<div class="container">
<h2>Awards & Achievements</h2>
<div class="grid" id="awards"></div>
</div>
</section>

<section class="section section-light">
<div class="container">
<h2>References</h2>
<div class="grid" id="references"></div>
</div>
</section>

<section class="section section-dark" id="contact">
<div class="container">
<h2>Contact</h2>
<div id="contactData"></div>
</div>
</section>

<footer>

© <span id="footerName"></span>

<div class="th">@th</div>

</footer>

<script src="data.js"></script>

<script>

document.getElementById("name").innerText=data.name
document.getElementById("footerName").innerText=data.name
document.getElementById("profile").innerText=data.profile

document.getElementById("contactData").innerHTML=`
Email: ${data.email}<br>
Mobile: ${data.mobile}<br>
LinkedIn: <a href="${data.linkedin}" target="_blank">${data.linkedin}</a>
`

let skills=""
data.skills.forEach(s=>{
skills+=`<div class="skill">${s}</div>`
})
skillsData.innerHTML=skills

let exp=""
data.experience.forEach(e=>{
exp+=`
<div class="timeline-item">
<b>${e.designation}</b><br>
${e.organization}<br>
${e.duration}<br>
${e.work}
</div>`
})
experienceData.innerHTML=exp

let edu=""
data.education.forEach(e=>{
edu+=`
<div class="edu-card">
<b>${e.degree}</b><br>
${e.institution}<br>
${e.year} – ${e.grade}
</div>`
})
educationData.innerHTML=edu

let proj=""
data.projects.forEach(p=>{
proj+=`
<div class="project">
<b>${p.title}</b><br>
${p.work}<br>
${p.org} (${p.year})
</div>`
})
projects.innerHTML=proj

let pub=""
data.publications.forEach(p=>{
pub+=`
<div class="pub-card">
<b>${p.title}</b><br>
${p.role}<br>
${p.publisher} (${p.year})
</div>`
})
publicationsData.innerHTML=pub

let cert=""
data.certifications.forEach(c=>{
cert+=`
<div class="slide">
<b>${c.title}</b><br>
${c.platform}<br>
${c.year}
<a class="verify-btn" href="${c.link}" target="_blank">Verify</a>
</div>`
})
certifications.innerHTML=cert+cert

let aw=""
data.awards.forEach(a=>{
aw+=`
<div class="award">
<b>${a.program}</b><br>
${a.year}<br>
${a.details}
</div>`
})
awards.innerHTML=aw

let ref=""
data.references.forEach(r=>{
ref+=`
<div class="reference">
<b>${r.name}</b><br>
${r.role}<br>
${r.email}<br>
${r.mobile}
</div>`
})
references.innerHTML=ref

</script>

</body>
</html>
